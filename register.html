<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Unidoc</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
        * { font-family: 'Inter', sans-serif; }
        .gradient-bg {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
        }
        .btn-primary {
            background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%);
        }
        .btn-primary:hover {
            background: linear-gradient(135deg, #2563eb 0%, #1e40af 100%);
        }
        /* Touch-friendly styles */
        input, button, select {
            min-height: 48px !important;
            font-size: 16px !important; /* Prevents iOS zoom */
        }
        a {
            touch-action: manipulation;
        }
    </style>
</head>
<body class="gradient-bg min-h-screen flex items-center justify-center p-4">
    <div class="max-w-md w-full">
        <div class="text-center mb-8">
            <a href="index.html" class="inline-flex items-center space-x-2 mb-6 touch-manipulation">
                <div class="w-12 h-12 rounded-xl btn-primary flex items-center justify-center">
                    <i class="fas fa-print text-white text-2xl"></i>
                </div>
                <span class="text-2xl font-bold text-white">Unidoc</span>
            </a>
            <h1 class="text-3xl font-bold text-white mb-2">Create account</h1>
            <p class="text-slate-400">Join thousands of students today</p>
        </div>
        <div class="bg-white rounded-2xl shadow-2xl p-6 sm:p-8">
            <form id="registerForm">
                <div class="space-y-5">
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">First Name</label>
                            <input type="text" id="firstName" required class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition" placeholder="John">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">Last Name</label>
                            <input type="text" id="lastName" required class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition" placeholder="Doe">
                        </div>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Email</label>
                        <div class="relative">
                            <span class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-400">
                                <i class="fas fa-envelope"></i>
                            </span>
                            <input type="email" id="email" required class="w-full pl-11 pr-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition" placeholder="you@example.com" autocomplete="email">
                        </div>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Password</label>
                        <div class="relative">
                            <span class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-400">
                                <i class="fas fa-lock"></i>
                            </span>
                            <input type="password" id="password" required class="w-full pl-11 pr-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition" placeholder="••••••••" autocomplete="new-password" minlength="6">
                        </div>
                    </div>
                    <button type="submit" class="w-full btn-primary text-white py-4 rounded-xl font-semibold hover:shadow-lg transition text-lg">
                        Create Account
                    </button>
                </div>
            </form>
            <div class="mt-6 text-center text-sm text-gray-600">
                Already have an account? <a href="login.html" class="text-blue-600 font-semibold hover:text-blue-800">Sign in</a>
            </div>
            <div class="mt-4 text-center">
                <a href="index.html" class="text-sm text-gray-500 hover:text-gray-700 inline-flex items-center">
                    <i class="fas fa-arrow-left mr-2"></i> Back to home
                </a>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('registerForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const firstName = document.getElementById('firstName').value.trim();
            const lastName = document.getElementById('lastName').value.trim();
            const email = document.getElementById('email').value.trim().toLowerCase();
            const password = document.getElementById('password').value;
            
            if (password.length < 6) {
                alert('Password must be at least 6 characters long');
                return;
            }
            
            // Get existing users or initialize empty array
            let users = JSON.parse(localStorage.getItem('unidoc_users') || '[]');
            
            // Check if email already exists
            const existingUser = users.find(u => u.email === email);
            if (existingUser) {
                alert('An account with this email already exists! Please login instead.');
                window.location.href = 'login.html';
                return;
            }
            
            // Create new user
            const newUser = {
                id: Date.now().toString(),
                firstName,
                lastName,
                email,
                password,
                role: 'student',
                createdAt: new Date().toISOString()
            };
            
            users.push(newUser);
            localStorage.setItem('unidoc_users', JSON.stringify(users));
            
            // Auto login
            localStorage.setItem('unidoc_currentUser', JSON.stringify(newUser));
            
            alert('Registration successful! Welcome to Unidoc!');
            window.location.href = 'dashboard.html';
        });
    </script>
</body>
</html>
