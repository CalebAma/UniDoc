<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Operator Dashboard - Unidoc</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
        * { font-family: 'Inter', sans-serif; }
        .btn-primary {
            background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%);
        }
        .btn-primary:hover {
            background: linear-gradient(135deg, #2563eb 0%, #1e40af 100%);
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <!-- Navigation -->
    <nav class="bg-white shadow-sm sticky top-0 z-40">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <div class="flex items-center">
                    <a href="index.html" class="flex items-center space-x-2">
                        <div class="w-10 h-10 rounded-xl btn-primary flex items-center justify-center">
                            <i class="fas fa-print text-white text-xl"></i>
                        </div>
                        <span class="text-xl font-bold text-slate-800">Unidoc</span>
                    </a>
                </div>
                <div class="flex items-center gap-4">
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 bg-purple-100 rounded-full flex items-center justify-center text-purple-600 font-semibold">OP</div>
                        <div class="hidden md:block">
                            <div class="text-sm font-semibold text-gray-800">Print Operator</div>
                            <div class="text-xs text-gray-500">Staff</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <div class="flex">
        <!-- Sidebar -->
        <aside class="w-64 bg-white shadow-sm min-h-screen hidden md:block">
            <div class="p-4">
                <nav class="space-y-2">
                    <a href="operator.html" class="flex items-center gap-3 px-4 py-3 rounded-xl bg-blue-50 text-blue-600 font-medium">
                        <i class="fas fa-tasks"></i> Queue
                    </a>
                    <a href="#" class="flex items-center gap-3 px-4 py-3 rounded-xl text-gray-600 hover:bg-gray-50 font-medium">
                        <i class="fas fa-history"></i> History
                    </a>
                    <a href="index.html" class="flex items-center gap-3 px-4 py-3 rounded-xl text-gray-600 hover:bg-gray-50 font-medium mt-8">
                        <i class="fas fa-sign-out-alt"></i> Logout
                    </a>
                </nav>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 p-6">
            <div class="max-w-7xl mx-auto">
                <div class="mb-8">
                    <h1 class="text-2xl font-bold text-gray-800 mb-2">Print Queue</h1>
                    <p class="text-gray-600">Manage incoming print orders</p>
                </div>

                <!-- Stats Cards -->
                <div class="grid md:grid-cols-4 gap-6 mb-8">
                    <div class="bg-white rounded-2xl p-6 shadow-sm">
                        <div class="text-3xl font-bold text-yellow-600" id="pendingCount">0</div>
                        <div class="text-gray-500 text-sm">Pending</div>
                    </div>
                    <div class="bg-white rounded-2xl p-6 shadow-sm">
                        <div class="text-3xl font-bold text-blue-600" id="printingCount">0</div>
                        <div class="text-gray-500 text-sm">Printing</div>
                    </div>
                    <div class="bg-white rounded-2xl p-6 shadow-sm">
                        <div class="text-3xl font-bold text-green-600" id="readyCount">0</div>
                        <div class="text-gray-500 text-sm">Ready</div>
                    </div>
                    <div class="bg-white rounded-2xl p-6 shadow-sm">
                        <div class="text-3xl font-bold text-gray-700" id="totalCount">0</div>
                        <div class="text-gray-500 text-sm">Today</div>
                    </div>
                </div>

                <!-- Queue -->
                <div class="bg-white rounded-2xl shadow-sm overflow-hidden">
                    <div class="p-6 border-b">
                        <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-4">
                            <h2 class="text-lg font-semibold text-gray-800">Incoming Orders</h2>
                            <div class="flex gap-3">
                                <input type="text" placeholder="Search orders..." class="px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none">
                                <select class="px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none" onchange="filterQueue(this.value)">
                                    <option value="all">All Status</option>
                                    <option value="pending">Pending</option>
                                    <option value="printing">Printing</option>
                                    <option value="ready">Ready</option>
                                </select>
                            </div>
                        </div>
                    </div>
                    <div id="queueList" class="divide-y">
                        <!-- Orders will be rendered here -->
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        let currentFilter = 'all';
        
        // Update stats
        function updateStats() {
            const orders = JSON.parse(localStorage.getItem('unidoc_orders') || '[]');
            const today = new Date().toDateString();
            
            document.getElementById('pendingCount').textContent = orders.filter(o => o.status === 'pending').length;
            document.getElementById('printingCount').textContent = orders.filter(o => o.status === 'printing').length;
            document.getElementById('readyCount').textContent = orders.filter(o => o.status === 'ready').length;
            document.getElementById('totalCount').textContent = orders.filter(o => new Date(o.createdAt).toDateString() === today).length;
        }
        
        // Filter queue
        function filterQueue(filter) {
            currentFilter = filter;
            renderQueue();
        }
        
        // Update order status
        function updateStatus(orderId, status) {
            let orders = JSON.parse(localStorage.getItem('unidoc_orders') || '[]');
            const index = orders.findIndex(o => o.id === orderId);
            if (index !== -1) {
                orders[index].status = status;
                localStorage.setItem('unidoc_orders', JSON.stringify(orders));
                updateStats();
                renderQueue();
            }
        }
        
        // Render queue
        function renderQueue() {
            let orders = JSON.parse(localStorage.getItem('unidoc_orders') || '[]');
            
            if (currentFilter !== 'all') {
                orders = orders.filter(o => o.status === currentFilter);
            }
            
            orders = orders.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
            
            const queueList = document.getElementById('queueList');
            
            if (orders.length === 0) {
                queueList.innerHTML = `
                    <div class="p-12 text-center">
                        <div class="w-20 h-20 bg-gray-100 rounded-full flex items-center justify-center mx-auto mb-4">
                            <i class="fas fa-inbox text-4xl text-gray-400"></i>
                        </div>
                        <h3 class="text-xl font-semibold text-gray-800 mb-2">No orders in queue</h3>
                        <p class="text-gray-600">All orders have been processed</p>
                    </div>
                `;
                return;
            }
            
            queueList.innerHTML = orders.map(order => {
                let statusColor = '';
                let statusBg = '';
                let actionBtn = '';
                
                switch(order.status) {
                    case 'pending':
                        statusColor = 'text-yellow-700';
                        statusBg = 'bg-yellow-100';
                        actionBtn = `<button onclick="updateStatus('${order.id}', 'printing')" class="btn-primary text-white px-4 py-2 rounded-lg font-medium text-sm">Start Printing</button>`;
                        break;
                    case 'printing':
                        statusColor = 'text-blue-700';
                        statusBg = 'bg-blue-100';
                        actionBtn = `<button onclick="updateStatus('${order.id}', 'ready')" class="bg-green-600 text-white px-4 py-2 rounded-lg font-medium text-sm hover:bg-green-700">Mark Ready</button>`;
                        break;
                    case 'ready':
                        statusColor = 'text-green-700';
                        statusBg = 'bg-green-100';
                        actionBtn = `<button onclick="updateStatus('${order.id}', 'collected')" class="bg-gray-600 text-white px-4 py-2 rounded-lg font-medium text-sm hover:bg-gray-700">Mark Collected</button>`;
                        break;
                    case 'collected':
                        statusColor = 'text-gray-700';
                        statusBg = 'bg-gray-100';
                        actionBtn = '';
                        break;
                }
                
                const fileIcon = order.fileName.endsWith('.pdf') ? 'fa-file-pdf text-red-600' : 
                                 order.fileName.endsWith('.docx') ? 'fa-file-word text-blue-600' : 
                                 'fa-file-powerpoint text-orange-600';
                
                const date = new Date(order.createdAt);
                const formattedDate = date.toLocaleDateString() + ' at ' + date.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                
                return `
                    <div class="p-6 hover:bg-gray-50">
                        <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-4">
                            <div class="flex items-center gap-4">
                                <div class="w-12 h-12 ${statusBg} rounded-xl flex items-center justify-center">
                                    <i class="fas ${fileIcon} text-2xl"></i>
                                </div>
                                <div>
                                    <div class="font-semibold text-gray-800">${order.fileName}</div>
                                    <div class="text-sm text-gray-500">Order #${order.id} • ${order.userName} • ${formattedDate}</div>
                                    <div class="flex gap-4 mt-1 text-xs text-gray-500">
                                        <span>${order.color === 'bw' ? 'Black & White' : 'Color'}</span>
                                        <span>${order.copies} copies</span>
                                        <span>${order.pages} pages</span>
                                        <span class="font-semibold text-blue-600">₵${order.total.toFixed(2)}</span>
                                    </div>
                                </div>
                            </div>
                            <div class="flex items-center gap-3">
                                <span class="px-3 py-1 ${statusBg} ${statusColor} rounded-full text-sm font-medium">${order.status.charAt(0).toUpperCase() + order.status.slice(1)}</span>
                                ${actionBtn}
                                ${order.status !== 'collected' ? `<button class="text-gray-500 hover:text-gray-700 p-2"><i class="fas fa-download"></i></button>` : ''}
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }
        
        // Initialize
        updateStats();
        renderQueue();
    </script>
</body>
</html>
