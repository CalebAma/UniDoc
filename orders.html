<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orders - Unidoc</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
        * { font-family: 'Inter', sans-serif; }
        .btn-primary {
            background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%);
        }
        .btn-primary:hover {
            background: linear-gradient(135deg, #2563eb 0%, #1e40af 100%);
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <!-- Navigation -->
    <nav class="bg-white shadow-sm sticky top-0 z-40">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <div class="flex items-center">
                    <a href="index.html" class="flex items-center space-x-2">
                        <div class="w-10 h-10 rounded-xl btn-primary flex items-center justify-center">
                            <i class="fas fa-print text-white text-xl"></i>
                        </div>
                        <span class="text-xl font-bold text-slate-800">Unidoc</span>
                    </a>
                </div>
                <div class="flex items-center gap-4">
                    <button class="relative p-2 text-gray-500 hover:text-blue-600">
                        <i class="fas fa-bell text-xl"></i>
                        <span class="absolute top-0 right-0 w-3 h-3 bg-red-500 rounded-full"></span>
                    </button>
                    <div class="flex items-center gap-3">
                        <div id="userAvatar" class="w-10 h-10 bg-blue-100 rounded-full flex items-center justify-center text-blue-600 font-semibold">JD</div>
                        <div class="hidden md:block">
                            <div id="userName" class="text-sm font-semibold text-gray-800">John Doe</div>
                            <div class="text-xs text-gray-500">Student</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <div class="flex">
        <!-- Sidebar -->
        <aside class="w-64 bg-white shadow-sm min-h-screen hidden md:block">
            <div class="p-4">
                <nav class="space-y-2">
                    <a href="dashboard.html" class="flex items-center gap-3 px-4 py-3 rounded-xl text-gray-600 hover:bg-gray-50 font-medium">
                        <i class="fas fa-home"></i> Dashboard
                    </a>
                    <a href="orders.html" class="flex items-center gap-3 px-4 py-3 rounded-xl bg-blue-50 text-blue-600 font-medium">
                        <i class="fas fa-receipt"></i> Orders
                    </a>
                    <a href="#" class="flex items-center gap-3 px-4 py-3 rounded-xl text-gray-600 hover:bg-gray-50 font-medium">
                        <i class="fas fa-wallet"></i> Wallet
                    </a>
                    <a href="#" class="flex items-center gap-3 px-4 py-3 rounded-xl text-gray-600 hover:bg-gray-50 font-medium">
                        <i class="fas fa-cog"></i> Settings
                    </a>
                    <a href="#" onclick="logout()" class="flex items-center gap-3 px-4 py-3 rounded-xl text-gray-600 hover:bg-gray-50 font-medium mt-8">
                        <i class="fas fa-sign-out-alt"></i> Logout
                    </a>
                </nav>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 p-6">
            <div class="max-w-6xl mx-auto">
                <div class="flex flex-col md:flex-row md:items-center md:justify-between mb-8">
                    <div>
                        <h1 class="text-2xl font-bold text-gray-800 mb-2">Your Orders</h1>
                        <p class="text-gray-600">Track the status of your print orders</p>
                    </div>
                    <a href="dashboard.html" class="btn-primary text-white px-6 py-3 rounded-xl font-medium mt-4 md:mt-0 inline-flex items-center">
                        <i class="fas fa-plus mr-2"></i> New Order
                    </a>
                </div>

                <!-- Filter Tabs -->
                <div class="flex gap-4 mb-6 overflow-x-auto pb-2">
                    <button class="px-4 py-2 rounded-lg bg-blue-600 text-white font-medium whitespace-nowrap" onclick="filterOrders('all')">All</button>
                    <button class="px-4 py-2 rounded-lg text-gray-600 hover:bg-gray-200 font-medium whitespace-nowrap" onclick="filterOrders('pending')">Pending</button>
                    <button class="px-4 py-2 rounded-lg text-gray-600 hover:bg-gray-200 font-medium whitespace-nowrap" onclick="filterOrders('printing')">Printing</button>
                    <button class="px-4 py-2 rounded-lg text-gray-600 hover:bg-gray-200 font-medium whitespace-nowrap" onclick="filterOrders('ready')">Ready</button>
                    <button class="px-4 py-2 rounded-lg text-gray-600 hover:bg-gray-200 font-medium whitespace-nowrap" onclick="filterOrders('collected')">Completed</button>
                </div>

                <!-- Orders List -->
                <div id="ordersList" class="space-y-4">
                    <!-- Orders will be rendered here -->
                </div>
                
                <div id="emptyState" class="hidden text-center py-12">
                    <div class="w-20 h-20 bg-gray-100 rounded-full flex items-center justify-center mx-auto mb-4">
                        <i class="fas fa-receipt text-4xl text-gray-400"></i>
                    </div>
                    <h3 class="text-xl font-semibold text-gray-800 mb-2">No orders yet</h3>
                    <p class="text-gray-600 mb-6">Place your first order to get started</p>
                    <a href="dashboard.html" class="btn-primary text-white px-6 py-3 rounded-xl font-medium inline-flex items-center">
                        <i class="fas fa-plus mr-2"></i> New Order
                    </a>
                </div>
            </div>
        </main>
    </div>

    <script>
        let currentFilter = 'all';
        
        // Check if user is logged in
        function checkAuth() {
            const user = JSON.parse(localStorage.getItem('unidoc_currentUser'));
            if (!user) {
                window.location.href = 'login.html';
                return;
            }
            
            // Update UI with user info
            document.getElementById('userName').textContent = `${user.firstName} ${user.lastName}`;
            document.getElementById('userAvatar').textContent = `${user.firstName[0]}${user.lastName[0]}`.toUpperCase();
            
            renderOrders();
        }
        
        // Logout
        function logout() {
            localStorage.removeItem('unidoc_currentUser');
            window.location.href = 'login.html';
        }
        
        // Filter orders
        function filterOrders(filter) {
            currentFilter = filter;
            renderOrders();
            
            // Update button styles
            document.querySelectorAll('.flex.gap-4 button').forEach(btn => {
                btn.classList.remove('bg-blue-600', 'text-white');
                btn.classList.add('text-gray-600', 'hover:bg-gray-200');
            });
            event.target.classList.remove('text-gray-600', 'hover:bg-gray-200');
            event.target.classList.add('bg-blue-600', 'text-white');
        }
        
        // Render orders
        function renderOrders() {
            const user = JSON.parse(localStorage.getItem('unidoc_currentUser'));
            let orders = JSON.parse(localStorage.getItem('unidoc_orders') || '[]');
            orders = orders.filter(o => o.userId === user.id);
            
            if (currentFilter !== 'all') {
                orders = orders.filter(o => o.status === currentFilter);
            }
            
            orders = orders.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
            
            const ordersList = document.getElementById('ordersList');
            const emptyState = document.getElementById('emptyState');
            
            if (orders.length === 0) {
                ordersList.classList.add('hidden');
                emptyState.classList.remove('hidden');
                return;
            }
            
            ordersList.classList.remove('hidden');
            emptyState.classList.add('hidden');
            
            ordersList.innerHTML = orders.map(order => {
                let statusClass = '';
                let statusIcon = '';
                let statusText = '';
                
                switch(order.status) {
                    case 'pending':
                        statusClass = 'bg-yellow-100 text-yellow-700';
                        statusIcon = 'fa-clock';
                        statusText = 'Pending';
                        break;
                    case 'printing':
                        statusClass = 'bg-blue-100 text-blue-700';
                        statusIcon = 'fa-spinner fa-spin';
                        statusText = 'Printing';
                        break;
                    case 'ready':
                        statusClass = 'bg-green-100 text-green-700';
                        statusIcon = 'fa-check-circle';
                        statusText = 'Ready for Pickup';
                        break;
                    case 'collected':
                        statusClass = 'bg-gray-100 text-gray-700';
                        statusIcon = 'fa-archive';
                        statusText = 'Collected';
                        break;
                }
                
                const date = new Date(order.createdAt);
                const formattedDate = date.toLocaleDateString() + ' at ' + date.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                
                const fileIcon = order.fileName.endsWith('.pdf') ? 'fa-file-pdf text-red-600' : 
                                 order.fileName.endsWith('.docx') ? 'fa-file-word text-blue-600' : 
                                 'fa-file-powerpoint text-orange-600';
                
                return `
                    <div class="bg-white rounded-2xl p-6 shadow-sm">
                        <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-4 mb-4">
                            <div class="flex items-center gap-4">
                                <div class="w-12 h-12 ${order.status === 'ready' ? 'bg-green-100' : order.status === 'printing' ? 'bg-blue-100' : 'bg-gray-100'} rounded-xl flex items-center justify-center">
                                    <i class="fas ${fileIcon} text-2xl"></i>
                                </div>
                                <div>
                                    <div class="font-semibold text-gray-800">${order.fileName}</div>
                                    <div class="text-sm text-gray-500">Order #${order.id} • ${formattedDate}</div>
                                </div>
                            </div>
                            <div class="flex items-center gap-3">
                                <span class="px-3 py-1 ${statusClass} rounded-full text-sm font-medium flex items-center">
                                    <i class="fas ${statusIcon} mr-1"></i> ${statusText}
                                </span>
                                <button class="border border-gray-300 text-gray-700 px-4 py-2 rounded-lg font-medium text-sm hover:bg-gray-50">View</button>
                            </div>
                        </div>
                        <div class="border-t pt-4 flex flex-wrap gap-6 text-sm text-gray-600">
                            <div><span class="font-medium text-gray-800">Color:</span> ${order.color === 'bw' ? 'Black & White' : 'Color'}</div>
                            <div><span class="font-medium text-gray-800">Copies:</span> ${order.copies}</div>
                            <div><span class="font-medium text-gray-800">Pages:</span> ${order.pages}</div>
                            <div><span class="font-medium text-gray-800">Total:</span> <span class="text-blue-600 font-bold text-base">₵${order.total.toFixed(2)}</span></div>
                        </div>
                    </div>
                `;
            }).join('');
        }
        
        // Listen for storage changes (real-time updates from other tabs/pages)
        window.addEventListener('storage', function(e) {
            if (e.key === 'unidoc_orders' || e.key === 'unidoc_users' || e.key === 'unidoc_currentUser') {
                renderOrders();
                // If currentUser changed, re-check auth
                if (e.key === 'unidoc_currentUser') {
                    checkAuth();
                }
            }
        });

        // Initialize
        checkAuth();
    </script>
</body>
</html>
