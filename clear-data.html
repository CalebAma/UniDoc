<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clear Data - Unidoc</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
        * { font-family: 'Inter', sans-serif; }
        .gradient-bg {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
        }
        .btn-primary {
            background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%);
        }
        .btn-primary:hover {
            background: linear-gradient(135deg, #2563eb 0%, #1e40af 100%);
        }
    </style>
</head>
<body class="gradient-bg min-h-screen flex items-center justify-center p-4">
    <div class="max-w-md w-full bg-white rounded-2xl shadow-2xl p-8 text-center">
        <div class="w-20 h-20 bg-red-100 rounded-full flex items-center justify-center mx-auto mb-6">
            <i class="fas fa-trash text-red-600 text-3xl"></i>
        </div>
        <h1 class="text-2xl font-bold text-gray-800 mb-4">Clear All Data</h1>
        <p class="text-gray-600 mb-8">This will delete all users, orders, and saved data from localStorage.</p>
        <div class="flex gap-4">
            <button onclick="clearAllData()" class="flex-1 bg-red-600 text-white py-3 rounded-xl font-semibold hover:bg-red-700 transition">
                Clear Everything
            </button>
            <a href="index.html" class="flex-1 btn-primary text-white py-3 rounded-xl font-semibold hover:shadow-lg transition flex items-center justify-center">
                Go Home
            </a>
        </div>
    </div>
    <script>
        function clearAllData() {
            localStorage.clear();
            alert('All data cleared successfully!');
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
